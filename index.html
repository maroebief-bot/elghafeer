<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>الغفير — أمان وراحة نفسية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #1a2e8a;
      --blue-dark: #0f1d5e;
      --blue-light: #243ab0;
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --gold-dark: #a07830;
      --white: #f5f0e8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--blue-dark);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== LOADING SCREEN ===== */
    #loader {
      position: fixed;
      inset: 0;
      background: var(--blue-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s ease, visibility 0.8s;
    }

    .loader-content {
      text-align: center;
      animation: pulse 2s infinite ease-in-out;
    }

    .loader-logo {
      width: 150px;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 20px var(--gold));
    }

    .loader-bar {
      width: 200px;
      height: 4px;
      background: rgba(201,168,76,0.2);
      border-radius: 10px;
      overflow: hidden;
      margin: 20px auto;
    }

    .loader-progress {
      width: 0%;
      height: 100%;
      background: var(--gold);
      animation: loadProgress 2.5s forwards ease-in-out;
    }

    @keyframes loadProgress {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
    }

    /* ===== MAIN CONTENT ===== */
    .container {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 20px;
      opacity: 0; /* مخفي في البداية */
      transition: opacity 1s ease;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 0 40px;
      text-align: center;
    }

    .logo-wrap {
      width: 180px;
      height: 180px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 8px 32px rgba(201,168,76,0.4));
    }

    .logo-wrap img { width: 100%; height: 100%; object-fit: contain; }

    .hero-title {
      font-size: 48px;
      font-weight: 900;
      color: var(--gold);
      text-shadow: 0 0 30px rgba(201,168,76,0.4);
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 20px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 18px 32px;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s ease;
    }

    .btn-gold {
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: var(--blue-dark);
      box-shadow: 0 4px 24px rgba(201,168,76,0.35);
    }

    .btn-outline {
      background: transparent;
      color: var(--gold);
      border: 2px solid var(--gold);
    }

    .features-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 40px;
    }

    .feature-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 16px;
      padding: 15px;
      text-align: center;
    }

    .footer {
      text-align: center;
      padding: 40px 0;
      color: rgba(245,240,232,0.3);
    }
  </style>
</head>
<body>

  <div id="loader">
    <div class="loader-content">
      <img src="logo.png" alt="الغفير" class="loader-logo">
      <h2 style="color: var(--gold); margin-top:10px;">جاري تشغيل المنظومة...</h2>
      <div class="loader-bar">
        <div class="loader-progress"></div>
      </div>
    </div>
  </div>

  <div class="container" id="main-content">
    <div class="hero">
      <div class="logo-wrap">
        <img src="logo.png" alt="شعار الغفير">
      </div>
      <h1 class="hero-title">الغفير</h1>
      <p style="opacity:0.7">أمان وراحة نفسية</p>
    </div>

    <div class="buttons">
      <a href="client/index.html" class="btn btn-gold">🧑 دخول كعميل</a>
      <a href="driver/index.html" class="btn btn-outline">🛺 دخول كسائق</a>
    </div>

    <div class="features-grid">
      <div class="feature-card">📍 تتبع مباشر</div>
      <div class="feature-card">🔐 QR تشغيل</div>
      <div class="feature-card">🚨 زر SOS</div>
      <div class="feature-card">🎙️ واكي توكي</div>
    </div>

    <div class="footer">
      <p>جميع الحقوق محفوظة © ٢٠٢٦ <span>الغفير</span></p>
    </div>
  </div>

  <script>
    // كود لإخفاء اللودر وإظهار المحتوى بعد 3 ثواني
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('loader').style.opacity = '0';
        document.getElementById('loader').style.visibility = 'hidden';
        document.getElementById('main-content').style.opacity = '1';
      }, 3000); 
    });
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

      projectId: "elghafeer-28543",
      storageBucket: "elghafeer-28543.firebasestorage.app",
      messagingSenderId: "862588981889",
      appId: "1:862588981889:web:36f5cfc3d1e9bcd8289f90",
      measurementId: "G-W19T89CCX1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

  </script>

</body>
</html>
